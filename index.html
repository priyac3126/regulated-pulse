<script type="module">
    // Import the functions using the specific web SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Your active Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBfCrRXdjRGutIpZU14pOic5BUhrgOF2BA",
      authDomain: "regulated-pulse.firebaseapp.com",
      projectId: "regulated-pulse",
      storageBucket: "regulated-pulse.firebasestorage.app",
      messagingSenderId: "386384989644",
      appId: "1:386384989644:web:4e962b8ea20ffaf621e169",
      measurementId: "G-226FYER9J4"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Function to submit a comment to the cloud
    window.submitComment = async function(event, postId) {
        event.preventDefault();
        
        const form = event.target;
        const nameInput = form.querySelector('input[type="text"]');
        const emailInput = form.querySelector('input[type="email"]');
        const textInput = form.querySelector('textarea');
        const btn = form.querySelector('button[type="submit"]');
        const originalBtnText = btn.innerText;

        try {
            btn.innerText = "Posting...";
            btn.disabled = true;
            
            // Send data to Firestore
            await addDoc(collection(db, "comments"), {
                postId: postId,
                name: nameInput.value,
                email: emailInput.value, // Saved securely in the database, but not displayed publicly
                text: textInput.value,
                createdAt: serverTimestamp(),
                likes: 0
            });
            
            // Clear the form
            form.reset();
        } catch (e) {
            console.error("Error adding document: ", e);
            alert("Something went wrong! Make sure your Firebase database rules are set up correctly.");
        } finally {
            btn.innerText = originalBtnText;
            btn.disabled = false;
        }
    };

    // Function to fetch comments from the cloud and draw them on screen
    window.loadComments = function(postId, containerId) {
        if (!db) return;

        const q = query(collection(db, "comments"), where("postId", "==", postId));
        
        // Listen for real-time updates
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById(containerId);
            if(!container) return;
            
            container.innerHTML = ""; 
            
            if (snapshot.empty) {
                container.innerHTML = '<p class="text-sm text-slate-400 mt-8 text-center border-t border-slate-700 pt-8 max-w-2xl mx-auto">No comments yet. Be the first to start the discussion!</p>';
                return;
            }

            // Grab the comments and sort them by newest first
            let commentsData = [];
            snapshot.forEach((doc) => commentsData.push({ id: doc.id, ...doc.data() }));
            commentsData.sort((a, b) => {
                 let timeA = a.createdAt ? a.createdAt.toMillis() : Date.now();
                 let timeB = b.createdAt ? b.createdAt.toMillis() : Date.now();
                 return timeB - timeA; 
            });

            // Draw the HTML for each comment
            commentsData.forEach((data) => {
                const initials = data.name ? data.name.substring(0, 2).toUpperCase() : "RP";
                const dateStr = data.createdAt ? data.createdAt.toDate().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : "Just now";

                const commentHTML = `
                  <div class="mt-8 pt-8 border-t border-slate-700 text-left max-w-2xl mx-auto">
                    <div class="flex items-center justify-between mb-2">
                      <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm" style="background: rgb(76, 29, 149); color: rgb(196, 181, 253);">${initials}</div>
                        <div>
                          <p class="font-semibold text-sm" style="color: rgb(226, 232, 240);">${data.name}</p>
                          <p class="text-xs" style="color: rgb(100, 116, 139);">${dateStr}</p>
                        </div>
                      </div>
                      <button type="button" class="text-slate-400 hover:text-cyan-400 transition-colors flex items-center gap-1 text-xs focus:outline-none" aria-label="Like comment" onclick="this.style.color='#06b6d4'; this.querySelector('span').innerText='1';">
                        <i data-lucide="heart" style="width: 16px; height: 16px;"></i> <span class="font-medium">${data.likes || 0}</span>
                      </button>
                    </div>
                    <p class="text-sm leading-relaxed mt-2 break-words" style="color: rgb(148, 163, 184);">${data.text}</p>
                  </div>
                `;
                container.insertAdjacentHTML('beforeend', commentHTML);
            });

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        });
    };
  </script>
